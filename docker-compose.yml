services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: evergreen
      POSTGRES_USER: evergreen
      POSTGRES_PASSWORD: evergreen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evergreen"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  rag:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://evergreen:evergreen@db:5432/evergreen
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    command: >
      uvicorn evergreen_rag.api.main:app
      --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  ollama_data:
